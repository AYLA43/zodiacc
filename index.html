<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zodiac Books</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#120018;
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* Stars */
.star {
  position:fixed;
  width:2px;
  height:2px;
  background:white;
  opacity:0.7;
  animation: twinkle 3s infinite alternate;
}
@keyframes twinkle {
  from {opacity:0.3;}
  to {opacity:1;}
}

/* Hero */
.hero {
  padding:80px 20px;
  background:linear-gradient(135deg,#2a003f,#120018);
}
.hero h1 {color:#ffd700;}

/* Books */
.books {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
  padding:40px;
}

/* Floating */
@keyframes float {
  0% {transform:translateY(0);}
  50% {transform:translateY(-10px);}
  100% {transform:translateY(0);}
}

.book {
  background:#1e0030;
  width:230px;
  padding:15px;
  border-radius:15px;
  animation:float 4s infinite ease-in-out;
}

.book img {
  width:100%;
  height:280px;
  border-radius:10px;
}

.old-price {text-decoration:line-through;color:#aaa;}
.price {color:#ffd700;font-size:20px;}
.save {color:#00ffcc;}

button {
  background:#ffd700;
  border:none;
  padding:10px;
  border-radius:5px;
  cursor:pointer;
}

/* Countdown */
.countdown {
  background:#ff4d4d;
  padding:5px;
  border-radius:5px;
  margin:5px 0;
  font-weight:bold;
}

/* Popup */
.popup {
  position:fixed;
  bottom:20px;
  left:20px;
  background:#ffd700;
  color:black;
  padding:12px 20px;
  border-radius:10px;
  display:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="hero">
<h1>✨ Zodiac Books Collection</h1>
<p>Discover your true self & unlock your future</p>
<div class="countdown" id="countdown">Loading offer...</div>
</div>

<div class="books">

<script>
const signs = [
"Aries","Taurus","Gemini","Cancer","Leo","Virgo",
"Libra","Scorpio","Sagittarius","Capricorn","Aquarius","Pisces"
];

const desc = {
Aries:"🔥 You always feel like you were meant for more. This book shows you exactly how to use your energy to win in life and stop wasting your potential.",
Taurus:"💎 You crave stability and money, but something blocks you. This reveals how to attract wealth and build the life you deserve.",
Gemini:"🧠 Your mind never stops. This book helps you control it, communicate better, and turn your thoughts into power.",
Cancer:"❤️ You feel everything deeply. This guide helps you protect your energy and finally stop getting hurt so easily.",
Leo:"👑 You know you're special. This book shows you how to fully step into your power and become impossible to ignore.",
Virgo:"📊 You overthink a lot. This will help you organize your life, focus your mind, and finally feel in control.",
Libra:"⚖️ You want love and balance. This book teaches you how to attract the right people and stop choosing wrong ones.",
Scorpio:"🦂 You feel things others don't. This reveals how to use your intensity as power instead of letting it control you.",
Sagittarius:"🏹 You want freedom. This shows you how to live fully, follow your purpose, and stop feeling stuck.",
Capricorn:"🏔 You want success. This gives you the exact mindset and discipline to build real results.",
Aquarius:"⚡ You think differently. This helps you turn your ideas into something powerful and valuable.",
Pisces:"🌊 You live in your emotions. This shows you how to use your intuition instead of being overwhelmed."
};

signs.forEach(sign=>{
  document.write(`
  <div class="book">
    <img src="${sign.toLowerCase()}">
    <h3>${sign}</h3>
    <p>${desc[sign]}</p>
    <p>⚠️ After reading this, you will understand yourself in a way most people never do.</p>
    <div class="old-price">$89</div>
    <div class="price">$56.87</div>
    <div class="save">Limited Offer</div>
    <a href="#"><button>Buy Now</button></a>
  </div>
  `);
});
</script>

</div>

<!-- Popup -->
<div class="popup" id="popup"></div>

<script>
// Stars
for(let i=0;i<100;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  document.body.appendChild(s);
}

// Fake purchases popup
const popup=document.getElementById("popup");

setInterval(()=>{
  let randomSign=signs[Math.floor(Math.random()*signs.length)];
  popup.innerText="🔥 Someone just bought "+randomSign+" Book!";
  popup.style.display="block";
  setTimeout(()=>popup.style.display="none",4000);
},6000);

// Countdown (10 minutes reset)
let time=600;
setInterval(()=>{
  let m=Math.floor(time/60);
  let s=time%60;
  document.getElementById("countdown").innerText=
  "⏰ Offer ends in "+m+":"+ (s<10?"0":"")+s;
  time--;
  if(time<=0) time=600;
},1000);
</script>

</body>
</html>
